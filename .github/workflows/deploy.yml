name: Test, build, and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: legal-lense-rag
  ECS_CLUSTER: legal-lense-cluster
  API_SERVICE: legal-lense-api

jobs:

# ─────────────────────────────────────────────
# 1. TEST JOB
# ─────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -q

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -q
        env:
          OPENAI_API_KEY: "test"
          PINECONE_API_KEY: "test"
          COHERE_API_KEY: "test"

# ─────────────────────────────────────────────
# 2. DEPLOY JOB
# ─────────────────────────────────────────────
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

# ── AWS AUTH ─────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

# ── ECR LOGIN ────────────────────────────
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

# ── BUILD IMAGE ──────────────────────────
      - name: Build Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

# ── PUSH IMAGE ───────────────────────────
      - name: Push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

# ── DEPLOY API ───────────────────────────
      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $API_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

# ── WAIT FOR STABILITY ───────────────────
      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $API_SERVICE \
            --region $AWS_REGION

# ── HEALTH CHECK ─────────────────────────
      - name: Verify deployment health
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names legal-lense-alb \
            --query "LoadBalancers[0].DNSName" \
            --output text)

          echo "Testing endpoint: http://$ALB_DNS/health"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://$ALB_DNS/health)

          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed: $STATUS"
            exit 1
          fi

# ── DEBUG (ON FAILURE) ───────────────────
      - name: Debug ECS service
        if: failure()
        run: |
          aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $API_SERVICE \
            --output table

# ── ROLLBACK ─────────────────────────────
      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Rolling back deployment..."
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $API_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION